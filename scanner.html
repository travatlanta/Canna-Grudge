<!doctype html>
<html lang="en" data-theme="dark"><head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NQ6KMSYC1"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2NQ6KMSYC1');</script>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Check-In Scanner 🔥 • CannaGrudge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="stylesheet" href="theme.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    #qr-reader { background: #000; border-radius: 12px; overflow: hidden; }
    #qr-reader video { width: 100% !important; border-radius: 12px; display: block; }
    #qr-reader__scan_region { border-radius: 12px; }
    :root {
      --cg-gold: #C8A84E;
      --cg-green: #27ae60;
      --cg-red: #e74c3c;
    }
    body { min-height: 100vh; background: #0a0a0a; }
    .scanner-wrap { max-width: 600px; margin: 0 auto; padding: 20px 16px 80px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--cg-gold); font-weight: 600; text-decoration: none; margin-bottom: 16px; font-size: 14px; }
    .scanner-title { font-size: 24px; font-weight: 900; letter-spacing: -.02em; margin-bottom: 16px; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
    .search-bar input {
      flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04); color: #fff; font-size: 16px; outline: none;
    }
    .search-bar input:focus { border-color: var(--cg-gold); box-shadow: 0 0 0 2px rgba(200,168,78,.15); }
    .search-bar input::placeholder { color: rgba(255,255,255,.35); }
    .search-bar button {
      padding: 12px 20px; border-radius: 12px; border: none;
      background: var(--cg-gold); color: #000; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    .search-bar button:hover { filter: brightness(1.1); }
    .result-card {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px; padding: 20px; margin-bottom: 12px; transition: all .2s;
    }
    .result-card.checked-in { border-color: rgba(39,174,96,.3); background: rgba(39,174,96,.05); }
    .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .result-name { font-size: 18px; font-weight: 800; }
    .result-email { font-size: 13px; color: rgba(255,255,255,.5); margin-top: 2px; }
    .result-order-num { font-size: 11px; font-weight: 700; color: var(--cg-gold); letter-spacing: .05em; }
    .result-items { margin: 12px 0; padding: 12px; background: rgba(255,255,255,.03); border-radius: 10px; }
    .result-item-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
    .result-item-label { color: rgba(255,255,255,.7); }
    .result-item-qty { color: #fff; font-weight: 700; }
    .badge { display: inline-flex; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .badge-green { background: rgba(39,174,96,.15); color: var(--cg-green); }
    .badge-gold { background: rgba(200,168,78,.15); color: var(--cg-gold); }
    .badge-red { background: rgba(231,76,60,.15); color: var(--cg-red); }
    .btn-checkin {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: var(--cg-green); color: #fff; font-size: 15px; font-weight: 800;
      cursor: pointer; transition: all .2s; margin-top: 8px;
    }
    .btn-checkin:hover { filter: brightness(1.1); }
    .btn-checkin:disabled { opacity: .4; cursor: not-allowed; }
    .btn-undo {
      width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,.1);
      background: transparent; color: rgba(255,255,255,.6); font-size: 13px; font-weight: 600;
      cursor: pointer; margin-top: 6px;
    }
    .btn-undo:hover { border-color: var(--cg-red); color: var(--cg-red); }
    .checkin-time { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 8px; text-align: center; }
    .no-results { text-align: center; color: rgba(255,255,255,.4); padding: 40px 0; font-size: 15px; }
    .loading-msg { text-align: center; color: var(--cg-gold); padding: 30px 0; }
    .access-denied-card { text-align: center; padding: 60px 20px; }
    .access-denied-card h2 { font-size: 22px; margin-bottom: 8px; }
    .access-denied-card p { color: rgba(255,255,255,.4); }
    #scannerAuth { display:none; }

    /* ── Guest List ── */
    .scanner-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .scanner-tab {
      flex: 1; padding: 10px 6px; border-radius: 10px; border: 1px solid rgba(255,255,255,.08);
      background: transparent; color: rgba(255,255,255,.5); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .scanner-tab.active { background: var(--cg-gold); border-color: var(--cg-gold); color: #000; }
    .stat-bar {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px;
    }
    .stat-box {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px; padding: 12px 8px; text-align: center;
    }
    .stat-box.stat-total { border-color: rgba(200,168,78,.2); }
    .stat-box.stat-in    { border-color: rgba(39,174,96,.2); }
    .stat-box.stat-out   { border-color: rgba(231,76,60,.15); }
    .stat-num  { font-size: 26px; font-weight: 900; line-height: 1; }
    .stat-num.gold { color: var(--cg-gold); }
    .stat-num.green { color: var(--cg-green); }
    .stat-num.red   { color: var(--cg-red); }
    .stat-label { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 3px; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
    .guest-search {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .guest-search input {
      flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04); color: #fff; font-size: 15px; outline: none;
    }
    .guest-search input:focus { border-color: var(--cg-gold); }
    .guest-search input::placeholder { color: rgba(255,255,255,.3); }
    .guest-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 12px; margin-bottom: 6px;
      border: 1px solid rgba(255,255,255,.05); background: rgba(255,255,255,.02);
      transition: all .15s;
    }
    .guest-row.is-in { border-color: rgba(39,174,96,.2); background: rgba(39,174,96,.04); }
    .guest-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900;
    }
    .guest-avatar.in  { background: rgba(39,174,96,.15); color: var(--cg-green); }
    .guest-avatar.out { background: rgba(255,255,255,.06); color: rgba(255,255,255,.4); }
    .guest-info { flex: 1; min-width: 0; }
    .guest-name { font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guest-sub  { font-size: 11px; color: rgba(255,255,255,.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guest-action button {
      padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; white-space: nowrap;
    }
    .btn-gl-checkin { background: var(--cg-green); color: #fff; }
    .btn-gl-checkin:hover { filter: brightness(1.1); }
    .btn-gl-undo { background: rgba(255,255,255,.07); color: rgba(255,255,255,.5); }
    .btn-gl-undo:hover { background: rgba(231,76,60,.15); color: var(--cg-red); }
    .guest-list-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .guest-list-count { font-size: 12px; color: rgba(255,255,255,.35); }
    .guest-refresh-btn {
      padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1);
      background: transparent; color: rgba(255,255,255,.5); font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .guest-refresh-btn:hover { border-color: var(--cg-gold); color: var(--cg-gold); }
    .section-divider { display: flex; align-items: center; gap: 10px; margin: 20px 0 16px; color: rgba(255,255,255,.3); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .section-divider hr { flex: 1; border: none; border-top: 1px solid rgba(255,255,255,.07); }
  </style>
</head>
<body>
  <div id="scannerLoading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--cg-gold);font-weight:700;">Loading...</div>
  <div id="scannerDenied" style="display:none;">
    <div class="scanner-wrap">
      <div class="access-denied-card">
        <h2>Access Denied</h2>
        <p>You must be an admin to use the check-in scanner.</p>
        <a href="/admin" style="display:inline-block;margin-top:16px;color:var(--cg-gold);font-weight:600;">Go to Admin</a>
      </div>
    </div>
  </div>
  <div id="scannerAuth" style="display:none;">
    <div class="scanner-wrap">
      <a href="/admin" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Admin
      </a>
      <h1 class="scanner-title">Check-In Scanner</h1>
      <div style="margin-bottom:16px;">
        <button id="scanToggleBtn" onclick="toggleScanner()" style="width:100%;padding:14px 20px;border-radius:12px;border:2px solid #e85d00;background:#e85d00;color:#ffffff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:0.02em;">📷 Scan QR Code</button>
        <div id="qr-reader" style="display:none;margin-top:12px;"></div>
        <div id="scanStatus" style="display:none;text-align:center;margin-top:6px;font-size:13px;padding:4px 0;"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;color:rgba(255,255,255,.3);font-size:12px;">
        <hr style="flex:1;border:none;border-top:1px solid rgba(255,255,255,.08);">
        <span>or search manually</span>
        <hr style="flex:1;border:none;border-top:1px solid rgba(255,255,255,.08);">
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Order #, email, or name..." autocomplete="off">
        <button id="searchBtn" onclick="doSearch()">Search</button>
      </div>
      <div id="results"></div>

      <!-- ── Guest List Section ── -->
      <div class="section-divider"><hr><span>Guest List</span><hr></div>

      <div class="stat-bar" id="statBar">
        <div class="stat-box stat-total"><div class="stat-num gold" id="statTotal">—</div><div class="stat-label">Total</div></div>
        <div class="stat-box stat-in"><div class="stat-num green" id="statIn">—</div><div class="stat-label">Checked In</div></div>
        <div class="stat-box stat-out"><div class="stat-num red" id="statOut">—</div><div class="stat-label">Remaining</div></div>
      </div>

      <div class="scanner-tabs">
        <button class="scanner-tab active" id="tabAll" onclick="setGuestTab('all')">All</button>
        <button class="scanner-tab" id="tabIn" onclick="setGuestTab('in')">Checked In</button>
        <button class="scanner-tab" id="tabOut" onclick="setGuestTab('out')">Not In</button>
      </div>

      <div class="guest-search">
        <input type="text" id="guestFilter" placeholder="Filter by name, email, or order #…" oninput="renderGuestList()">
      </div>

      <div class="guest-list-meta">
        <span class="guest-list-count" id="guestCount"></span>
        <button class="guest-refresh-btn" onclick="loadGuestList(true)">↻ Refresh</button>
      </div>

      <div id="guestList"><div class="loading-msg" style="padding:30px 0;">Loading guest list…</div></div>
    </div>
  </div>

  <script src="api-config.js"></script>
  <script src="firebase-config.js" type="module"></script>
  <script type="module">
    const { auth, onAuthStateChanged } = window.__cgAuth || {};

    function waitForAuth() {
      return new Promise(resolve => {
        if (window.__cgAuth) return resolve();
        const iv = setInterval(() => { if (window.__cgAuth) { clearInterval(iv); resolve(); } }, 50);
        setTimeout(() => { clearInterval(iv); resolve(); }, 5000);
      });
    }

    async function getToken() {
      const u = window.__cgAuth?.auth?.currentUser;
      return u ? u.getIdToken() : null;
    }

    async function apiFetch(url, opts = {}) {
      const token = await getToken();
      if (!token) throw new Error('Not authenticated');
      const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) };
      const fullUrl = (window.CG_API_BASE || '') + url;
      const res = await fetch(fullUrl, { ...opts, headers });
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        throw new Error(d.error || `Request failed (${res.status})`);
      }
      return res.json();
    }

    await waitForAuth();

    onAuthStateChanged(auth, async (user) => {
      document.getElementById('scannerLoading').style.display = 'none';
      if (!user) { window.location.href = '/admin'; return; }
      try {
        const v = await apiFetch('/api/admin/verify', { method: 'POST' });
        if (!v.is_admin) { document.getElementById('scannerDenied').style.display = 'block'; return; }
        document.getElementById('scannerAuth').style.display = 'block';
        document.getElementById('searchInput').focus();
        // Auth confirmed — safe to load guest list now
        window.loadGuestList();
        _guestRefreshTimer = setInterval(() => window.loadGuestList(), 60000);
        // Load guest list only after auth is confirmed
        window.loadGuestList();
        _guestRefreshTimer = setInterval(() => window.loadGuestList(), 60000);
      } catch (e) {
        document.getElementById('scannerDenied').style.display = 'block';
      }
    });

    // Expose to global scope for inline handlers
    window._apiFetch = apiFetch;

    window.doSearch = async function() {
      const q = document.getElementById('searchInput').value.trim();
      const resultsDiv = document.getElementById('results');
      if (!q) { resultsDiv.innerHTML = ''; return; }
      resultsDiv.innerHTML = '<div class="loading-msg">Searching...</div>';
      try {
        const orders = await apiFetch(`/api/admin/checkin/lookup?q=${encodeURIComponent(q)}`);
        if (!orders.length) {
          resultsDiv.innerHTML = '<div class="no-results">No matching orders found</div>';
          return;
        }
        resultsDiv.innerHTML = orders.map(o => renderOrder(o)).join('');
      } catch (e) {
        resultsDiv.innerHTML = `<div class="no-results">${e.message}</div>`;
      }
    };

    function renderOrder(o) {
      const isCheckedIn = !!o.checked_in;
      const items = (o.items || []).map(i =>
        `<div class="result-item-row"><span class="result-item-label">${i.tier_name}</span><span class="result-item-qty">&times; ${i.qty}</span></div>`
      ).join('');
      const checkinTime = o.checked_in_at ? new Date(o.checked_in_at).toLocaleString() : '';

      return `<div class="result-card ${isCheckedIn ? 'checked-in' : ''}" id="order-${o.id}">
        <div class="result-header">
          <div>
            <div class="result-name">${o.name || 'Guest'}</div>
            <div class="result-email">${o.email || ''}</div>
          </div>
          <div style="text-align:right;">
            <div class="result-order-num">${o.order_number || '#' + o.id}</div>
            ${isCheckedIn
              ? '<span class="badge badge-green">Checked In</span>'
              : '<span class="badge badge-gold">Not Checked In</span>'}
          </div>
        </div>
        <div class="result-items">${items || '<span style="color:rgba(255,255,255,.4);">No items</span>'}</div>
        ${isCheckedIn
          ? `<div class="checkin-time">Checked in: ${checkinTime}</div>
             <button class="btn-undo" onclick="undoCheckin(${o.id})">Undo Check-In</button>`
          : `<button class="btn-checkin" onclick="doCheckin(${o.id})">Check In</button>`}
      </div>`;
    }
    window.renderOrder = renderOrder;

    // ── QR Camera Scanner ──
    let _qrScanner = null;
    let _scannerActive = false;

    window.toggleScanner = async function() {
      const scanDiv = document.getElementById('qr-reader');
      const btn = document.getElementById('scanToggleBtn');
      const statusEl = document.getElementById('scanStatus');

      if (_scannerActive) {
        if (_qrScanner) { try { await _qrScanner.stop(); } catch(e) {} _qrScanner = null; }
        _scannerActive = false;
        scanDiv.style.display = 'none';
        statusEl.style.display = 'none';
        btn.textContent = '📷 Scan QR Code';
        return;
      }

      _scannerActive = true;
      scanDiv.style.display = 'block';
      statusEl.style.display = 'block';
      statusEl.style.color = 'rgba(255,255,255,.5)';
      statusEl.textContent = 'Starting camera…';
      btn.textContent = '⏹ Stop Camera';

      try {
        _qrScanner = new Html5Qrcode('qr-reader');
        await _qrScanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          async (decoded) => {
            if (_qrScanner) { try { await _qrScanner.stop(); } catch(e) {} _qrScanner = null; }
            _scannerActive = false;
            scanDiv.style.display = 'none';
            statusEl.textContent = '✓ Scanned: ' + decoded;
            statusEl.style.color = 'var(--cg-green)';
            btn.textContent = '📷 Scan QR Code';
            document.getElementById('searchInput').value = decoded.trim();
            doSearch();
          },
          () => {}
        );
        statusEl.textContent = 'Point camera at ticket QR code';
      } catch (err) {
        _scannerActive = false;
        _qrScanner = null;
        scanDiv.style.display = 'none';
        statusEl.textContent = 'Camera access denied — use manual search instead.';
        statusEl.style.color = 'var(--cg-red)';
        btn.textContent = '📷 Scan QR Code';
      }
    };

    window.doCheckin = async function(id) {
      const btn = document.querySelector(`#order-${id} .btn-checkin`);
      if (btn) { btn.disabled = true; btn.textContent = 'Checking in...'; }
      try {
        const res = await apiFetch(`/api/admin/checkin/${id}`, { method: 'POST' });
        // Re-search to refresh
        doSearch();
      } catch (e) {
        alert(e.message);
        if (btn) { btn.disabled = false; btn.textContent = 'Check In'; }
      }
    };

    window.undoCheckin = async function(id) {
      if (!confirm('Undo this check-in?')) return;
      try {
        await apiFetch(`/api/admin/checkin/${id}/undo`, { method: 'POST' });
        doSearch();
      } catch (e) {
        alert(e.message);
      }
    };

    // Enter key triggers search
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    // ── Guest List ──
    let _guestData = [];
    let _guestTab = 'all';
    let _guestRefreshTimer = null;

    window.setGuestTab = function(tab) {
      _guestTab = tab;
      document.querySelectorAll('.scanner-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
      renderGuestList();
    };

    window.loadGuestList = async function(showRefreshing = false) {
      if (showRefreshing) {
        document.getElementById('guestList').innerHTML = '<div class="loading-msg" style="padding:24px 0;">Refreshing…</div>';
      }
      try {
        const data = await apiFetch('/api/admin/checkin/guestlist');
        _guestData = data.orders || [];
        document.getElementById('statTotal').textContent = data.total ?? _guestData.length;
        document.getElementById('statIn').textContent    = data.checked_in ?? 0;
        document.getElementById('statOut').textContent   = data.remaining ?? 0;
        renderGuestList();
      } catch (e) {
        document.getElementById('guestList').innerHTML = `<div class="no-results">${e.message}</div>`;
      }
    };

    window.renderGuestList = function() {
      const q = (document.getElementById('guestFilter').value || '').toLowerCase().trim();
      let list = _guestData.filter(o => {
        if (_guestTab === 'in'  && !o.checked_in) return false;
        if (_guestTab === 'out' &&  o.checked_in) return false;
        if (!q) return true;
        return (o.name || '').toLowerCase().includes(q)
            || (o.email || '').toLowerCase().includes(q)
            || (o.order_number || '').toLowerCase().includes(q);
      });

      document.getElementById('guestCount').textContent = `${list.length} guest${list.length !== 1 ? 's' : ''}`;

      if (!list.length) {
        document.getElementById('guestList').innerHTML = '<div class="no-results" style="padding:30px 0;">No guests match</div>';
        return;
      }

      document.getElementById('guestList').innerHTML = list.map(o => {
        const initials = (o.name || 'G').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        const tickets  = (o.items || []).map(i => `${i.qty}× ${i.tier_name}`).join(', ') || 'Ticket';
        const checkinTime = o.checked_in_at ? new Date(o.checked_in_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        const sub = o.checked_in ? `✓ ${checkinTime}  ·  ${tickets}` : `${o.order_number || '#' + o.id}  ·  ${tickets}`;
        return `<div class="guest-row ${o.checked_in ? 'is-in' : ''}" id="gl-${o.id}">
          <div class="guest-avatar ${o.checked_in ? 'in' : 'out'}">${o.checked_in ? '✓' : initials}</div>
          <div class="guest-info">
            <div class="guest-name">${o.name || 'Guest'}</div>
            <div class="guest-sub">${sub}</div>
          </div>
          <div class="guest-action">
            ${o.checked_in
              ? `<button class="btn-gl-undo" onclick="glUndo(${o.id})">Undo</button>`
              : `<button class="btn-gl-checkin" onclick="glCheckin(${o.id})">Check In</button>`}
          </div>
        </div>`;
      }).join('');
    };

    window.glCheckin = async function(id) {
      const btn = document.querySelector(`#gl-${id} button`);
      if (btn) { btn.disabled = true; btn.textContent = '…'; }
      try {
        await apiFetch(`/api/admin/checkin/${id}`, { method: 'POST' });
        const o = _guestData.find(x => x.id === id);
        if (o) { o.checked_in = true; o.checked_in_at = new Date().toISOString(); }
        // update stats
        const inCount = _guestData.filter(x => x.checked_in).length;
        document.getElementById('statIn').textContent  = inCount;
        document.getElementById('statOut').textContent = _guestData.length - inCount;
        renderGuestList();
        // also refresh the search results area if it's showing this order
        if (document.getElementById('searchInput').value.trim()) doSearch();
      } catch (e) {
        alert(e.message);
        if (btn) { btn.disabled = false; btn.textContent = 'Check In'; }
      }
    };

    window.glUndo = async function(id) {
      if (!confirm('Undo this check-in?')) return;
      try {
        await apiFetch(`/api/admin/checkin/${id}/undo`, { method: 'POST' });
        const o = _guestData.find(x => x.id === id);
        if (o) { o.checked_in = false; o.checked_in_at = null; }
        const inCount = _guestData.filter(x => x.checked_in).length;
        document.getElementById('statIn').textContent  = inCount;
        document.getElementById('statOut').textContent = _guestData.length - inCount;
        renderGuestList();
        if (document.getElementById('searchInput').value.trim()) doSearch();
      } catch (e) {
        alert(e.message);
      }
    };

    // Load on mount, then auto-refresh every 60s
    // (actual call is inside onAuthStateChanged after auth confirmed)
  </script>
</body></html>
