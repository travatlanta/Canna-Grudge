# Fly.io configuration for CannaGrudge
app = 'cannagrudge'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = 'http'
    port = 8080
    path = '/health'
    interval = '30s'
    timeout = '5s'
