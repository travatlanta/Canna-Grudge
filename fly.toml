# fly.toml app configuration file generated for cannagrudge-atl on 2026-02-25T13:30:49-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cannagrudge-atl'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "15s"
    interval = "20s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    restart_limit = 3

[deploy]
  strategy = "rolling"
  wait_timeout = "5m"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
